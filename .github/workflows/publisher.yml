name: Publish image for puppeteer

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  test:
    strategy:
      fail-fast: true
      matrix:
        version: [ 20-alpine, 22-alpine, 24-alpine ]
    runs-on: ubuntu-latest
    name: Pre-publish test (node:${{ matrix.version }})
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build image
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64
          build-args: |
            NODE_VERSION=${{ matrix.version }}
          tags: docker-puppeteer:test
          load: true
          cache-from: type=gha,scope=build-${{ matrix.version }}

      - name: Install container-structure-test
        run: |
          curl -LO https://github.com/GoogleContainerTools/container-structure-test/releases/download/v1.22.1/container-structure-test-linux-amd64
          chmod +x container-structure-test-linux-amd64
          sudo mv container-structure-test-linux-amd64 /usr/local/bin/container-structure-test

      - name: Run structure tests
        run: |
          container-structure-test test \
            --image docker-puppeteer:test \
            --config test/structure-test.yaml

      - name: Smoke test - Chromium launches
        run: |
          docker run --rm docker-puppeteer:test \
            chromium-browser --headless --no-sandbox --disable-gpu --dump-dom about:blank

  build:
    needs: test
    strategy:
      fail-fast: false
      matrix:
        version: [ 20-alpine, 22-alpine, 24-alpine ]
    runs-on: ubuntu-latest
    name: Build and Push
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to DockerHub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Node major version
        id: node
        run: echo "major=$(echo '${{ matrix.version }}' | sed 's/-alpine//')" >> "$GITHUB_OUTPUT"

      - name: Docker metadata
        id: metadata
        uses: docker/metadata-action@v6
        with:
          images: |
            name=icedrone/docker-puppeteer
            name=ghcr.io/icedrone/docker-puppeteer
          tags: |
            type=ref,event=tag,suffix=-${{ matrix.version }}
            type=semver,pattern={{version}},suffix=-${{ matrix.version }}
            type=semver,pattern={{major}}.{{minor}},suffix=-${{ matrix.version }}
            type=semver,pattern={{major}},suffix=-${{ matrix.version }}
            type=sha,suffix=-${{ matrix.version }}
            type=raw,value=latest-${{ matrix.version }},enable=true
            type=raw,value=${{ matrix.version }},enable=true
            type=raw,value=latest,enable=${{ matrix.version == '22-alpine' }}
            type=raw,value=${{ steps.node.outputs.major }},enable=true
            type=raw,value=latest-${{ steps.node.outputs.major }},enable=true
            type=semver,pattern={{version}},enable=${{ matrix.version == '22-alpine' }}
            type=semver,pattern={{major}}.{{minor}},enable=${{ matrix.version == '22-alpine' }}
            type=semver,pattern={{major}},enable=${{ matrix.version == '22-alpine' }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.metadata.outputs.tags }}
          labels: ${{ steps.metadata.outputs.labels }}
          build-args: |
            NODE_VERSION=${{ matrix.version }}
          cache-from: type=gha,scope=build-${{ matrix.version }}
          cache-to: type=gha,mode=max,scope=build-${{ matrix.version }}
          provenance: true
          sbom: true

  docker-hub-update:
    runs-on: ubuntu-latest
    needs: build
    name: Update README on Docker Hub
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Update DockerHub description
        uses: peter-evans/dockerhub-description@v5
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: icedrone/docker-puppeteer
