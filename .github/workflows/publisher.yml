name: Publish image for puppeteer

on:
  push:
    tags:
      - 'v*'
permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  build:
    strategy:
      matrix:
        version: [ 18-alpine, 20-alpine, 22-alpine ]
    runs-on: ubuntu-latest
    name: Build and Push
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker metadata
        id: metadata
        uses: docker/metadata-action@v5
        with:
          images: |
            name=icedrone/docker-puppeteer
            name=ghcr.io/icedrone/docker-puppeteer
          tags: |
            type=ref,event=tag,suffix=-${{ matrix.version }}
            type=semver,pattern={{version}},suffix=-${{ matrix.version }}
            type=semver,pattern={{major}}.{{minor}},suffix=-${{ matrix.version }}
            type=semver,pattern={{major}},suffix=-${{ matrix.version }}
            type=sha,suffix=-${{ matrix.version }}
            type=raw,value=latest-${{ matrix.version }},enable=true
            type=raw,value=${{ matrix.version }},enable=true

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.metadata.outputs.tags }}
          labels: ${{ steps.metadata.outputs.labels }}
          build-args: |
            NODE_VERSION=${{ matrix.version }}


  docker-hub-update:
    runs-on: ubuntu-latest
    needs: build
    name: Update README on Docker Hub
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Update DockerHub description
        uses: peter-evans/dockerhub-description@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: icedrone/docker-puppeteer
