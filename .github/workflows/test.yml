name: Test Docker Image

on:
  pull_request:
    branches: [master, develop]
  push:
    branches: [master, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-amd64:
    strategy:
      fail-fast: false
      matrix:
        version: [20-alpine, 22-alpine, 24-alpine]
    runs-on: ubuntu-latest
    name: Test (node:${{ matrix.version }}, amd64)
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build image
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64
          build-args: |
            NODE_VERSION=${{ matrix.version }}
          tags: docker-puppeteer:test
          load: true
          cache-from: type=gha,scope=test-${{ matrix.version }}-amd64
          cache-to: type=gha,mode=max,scope=test-${{ matrix.version }}-amd64

      - name: Install container-structure-test
        run: |
          curl -LO https://github.com/GoogleContainerTools/container-structure-test/releases/download/v1.22.1/container-structure-test-linux-amd64
          chmod +x container-structure-test-linux-amd64
          sudo mv container-structure-test-linux-amd64 /usr/local/bin/container-structure-test

      - name: Run structure tests
        run: |
          container-structure-test test \
            --image docker-puppeteer:test \
            --config test/structure-test.yaml

      - name: Run integration tests
        run: |
          docker run --rm \
            -v ${{ github.workspace }}/test/integration:/tests:ro \
            docker-puppeteer:test \
            sh -c "cp -r /tests /tmp/tests && cd /tmp/tests && npm install && npx vitest run"

      - name: Install goss and dgoss
        run: |
          GOSS_VER=v0.4.9
          sudo curl -fsSL -o /usr/local/bin/goss "https://github.com/goss-org/goss/releases/download/${GOSS_VER}/goss-linux-amd64"
          sudo chmod +x /usr/local/bin/goss
          sudo curl -fsSL -o /usr/local/bin/dgoss "https://raw.githubusercontent.com/goss-org/goss/${GOSS_VER}/extras/dgoss/dgoss"
          sudo chmod +x /usr/local/bin/dgoss

      - name: Run dgoss tests
        env:
          GOSS_FILE: test/goss.yaml
        run: |
          dgoss run docker-puppeteer:test sleep infinity

  test-arm64:
    strategy:
      fail-fast: false
      matrix:
        version: [20-alpine, 22-alpine, 24-alpine]
    runs-on: ubuntu-latest
    name: Test (node:${{ matrix.version }}, arm64)
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build image
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/arm64
          build-args: |
            NODE_VERSION=${{ matrix.version }}
          tags: docker-puppeteer:test
          load: true
          cache-from: type=gha,scope=test-${{ matrix.version }}-arm64
          cache-to: type=gha,mode=max,scope=test-${{ matrix.version }}-arm64

      - name: Install goss and dgoss
        run: |
          GOSS_VER=v0.4.9
          sudo curl -fsSL -o /usr/local/bin/goss "https://github.com/goss-org/goss/releases/download/${GOSS_VER}/goss-linux-amd64"
          sudo chmod +x /usr/local/bin/goss
          sudo curl -fsSL -o /usr/local/bin/dgoss "https://raw.githubusercontent.com/goss-org/goss/${GOSS_VER}/extras/dgoss/dgoss"
          sudo chmod +x /usr/local/bin/dgoss

      - name: Run dgoss tests
        env:
          GOSS_FILE: test/goss-arm64.yaml
        run: |
          dgoss run --platform linux/arm64 docker-puppeteer:test sleep infinity

      - name: Verify Chromium installed
        run: |
          docker run --rm --platform linux/arm64 docker-puppeteer:test which chromium-browser
