name: Test Docker Image

on:
  pull_request:
    branches: [master, develop]
  push:
    branches: [master, develop]
  workflow_call:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-amd64:
    strategy:
      fail-fast: false
      matrix:
        version: [20-alpine, 22-alpine, 24-alpine]
    runs-on: ubuntu-latest
    name: Test (node:${{ matrix.version }}, amd64)
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build image
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64
          build-args: |
            NODE_VERSION=${{ matrix.version }}
          tags: docker-puppeteer:test
          load: true
          cache-from: type=gha,scope=test-${{ matrix.version }}-amd64
          cache-to: type=gha,mode=max,scope=test-${{ matrix.version }}-amd64

      - name: Install container-structure-test
        run: |
          curl -LO https://github.com/GoogleContainerTools/container-structure-test/releases/download/v1.22.1/container-structure-test-linux-amd64
          echo "fa35e89512a8978585f76cf41397956d2e3a30c62c2ad3fb857b1597074d14ca  container-structure-test-linux-amd64" | sha256sum --check
          chmod +x container-structure-test-linux-amd64
          sudo mv container-structure-test-linux-amd64 /usr/local/bin/container-structure-test

      - name: Run structure tests
        run: |
          container-structure-test test \
            --image docker-puppeteer:test \
            --config test/structure-test.yaml

      - name: Run integration tests
        run: |
          docker run --rm \
            -v ${{ github.workspace }}/test/integration:/tests:ro \
            docker-puppeteer:test \
            sh -c "cp -r /tests /tmp/tests && cd /tmp/tests && npm install && npx vitest run"

      - name: Install goss and dgoss
        run: |
          GOSS_VER=v0.4.9
          sudo curl -fsSL -o /usr/local/bin/goss "https://github.com/goss-org/goss/releases/download/${GOSS_VER}/goss-linux-amd64"
          echo "87dd36cfa1b8b50554e6e2ca29168272e26755b19ba5438341f7c66b36decc19  /usr/local/bin/goss" | sha256sum --check
          sudo chmod +x /usr/local/bin/goss
          sudo curl -fsSL -o /usr/local/bin/dgoss "https://raw.githubusercontent.com/goss-org/goss/${GOSS_VER}/extras/dgoss/dgoss"
          echo "7ee35d6ccbe1440eb2a08984a43e8b3742f2e849abdc0d7384ac08de55682d7c  /usr/local/bin/dgoss" | sha256sum --check
          sudo chmod +x /usr/local/bin/dgoss

      - name: Run dgoss tests
        env:
          GOSS_FILE: test/goss.yaml
        run: |
          dgoss run docker-puppeteer:test sleep infinity

      - name: Scan image for vulnerabilities
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: docker-puppeteer:test
          format: table
          exit-code: '1'
          severity: CRITICAL,HIGH
          scanners: vuln
          trivyignores: .trivyignore

  test-arm64:
    strategy:
      fail-fast: false
      matrix:
        version: [20-alpine, 22-alpine, 24-alpine]
    runs-on: ubuntu-24.04-arm
    name: Test (node:${{ matrix.version }}, arm64)
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build image
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/arm64
          build-args: |
            NODE_VERSION=${{ matrix.version }}
          tags: docker-puppeteer:test
          load: true
          cache-from: type=gha,scope=test-${{ matrix.version }}-arm64
          cache-to: type=gha,mode=max,scope=test-${{ matrix.version }}-arm64

      - name: Install container-structure-test
        run: |
          curl -fsSL -o container-structure-test-linux-arm64 https://github.com/GoogleContainerTools/container-structure-test/releases/download/v1.22.1/container-structure-test-linux-arm64
          echo "801826ed107222120eb6df8c143b7de752cfebbe3aebfeea576e7098486917c2  container-structure-test-linux-arm64" | sha256sum --check
          chmod +x container-structure-test-linux-arm64
          sudo mv container-structure-test-linux-arm64 /usr/local/bin/container-structure-test

      - name: Run structure tests
        run: |
          container-structure-test test \
            --image docker-puppeteer:test \
            --config test/structure-test.yaml

      - name: Run integration tests
        run: |
          docker run --rm \
            -v ${{ github.workspace }}/test/integration:/tests:ro \
            docker-puppeteer:test \
            sh -c "cp -r /tests /tmp/tests && cd /tmp/tests && npm install && npx vitest run"

      - name: Install goss and dgoss
        run: |
          GOSS_VER=v0.4.9
          sudo curl -fsSL -o /usr/local/bin/goss "https://github.com/goss-org/goss/releases/download/${GOSS_VER}/goss-linux-arm64"
          echo "14fd24ac08236559f4809e6a627792d1b947ed98654bba1662ef1d6122d77e18  /usr/local/bin/goss" | sha256sum --check
          sudo chmod +x /usr/local/bin/goss
          sudo curl -fsSL -o /usr/local/bin/dgoss "https://raw.githubusercontent.com/goss-org/goss/${GOSS_VER}/extras/dgoss/dgoss"
          echo "7ee35d6ccbe1440eb2a08984a43e8b3742f2e849abdc0d7384ac08de55682d7c  /usr/local/bin/dgoss" | sha256sum --check
          sudo chmod +x /usr/local/bin/dgoss

      - name: Run dgoss tests
        env:
          GOSS_FILE: test/goss.yaml
        run: |
          dgoss run docker-puppeteer:test sleep infinity

      - name: Scan image for vulnerabilities
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: docker-puppeteer:test
          format: table
          exit-code: '1'
          severity: CRITICAL,HIGH
          scanners: vuln
          trivyignores: .trivyignore
